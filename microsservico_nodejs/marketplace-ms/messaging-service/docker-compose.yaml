version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: marketplace-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    ports:
      - "5672:5672" # AMQP port - porta de comunicação
      - "15672:15672" # Management UI port - painel de administração
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ## Sempre reiniciar se cair
    restart: unless-stopped
    # Health check para garantir que está funcionando
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

# Volume para persistência de dados
volumes:
  rabbitmq_data:
