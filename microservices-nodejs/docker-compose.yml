services:
  broker:
    image: rabbitmq:3-management
    ports:
      - "5672:5672" # Usada para enviar e receber mensagem entre microserviços
      - "15672:15672" # Usada para acessar a interface de gerenciamento do RabbitMQ
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686" # Jaeger UI
      - "6831:6831/udp" # Envio dos tracers
      - "14268:14268" # Traces HTTP
      - "4317:4317" # OTLP/gRPC
      - "4318:4318" # OTLP/HTTP

volumes:
  rabbitmq_data: